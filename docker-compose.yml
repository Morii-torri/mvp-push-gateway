x-backend-image: &backend-image
  image: ${MGP_BACKEND_IMAGE:-mvp-push-gateway-backend:local}
  build:
    context: .
    dockerfile: backend/Dockerfile
    args:
      MGP_GO_BUILDER_IMAGE: ${MGP_GO_BUILDER_IMAGE:-golang:1.22-alpine}
      MGP_BACKEND_RUNTIME_IMAGE: ${MGP_BACKEND_RUNTIME_IMAGE:-alpine:3.20}

services:
  all-in-one:
    profiles: ["all-in-one"]
    image: ${MGP_ALL_IN_ONE_IMAGE:-mvp-push-gateway:all-in-one}
    build:
      context: .
      dockerfile: docker/all-in-one/Dockerfile
      args:
        MGP_GO_BUILDER_IMAGE: ${MGP_GO_BUILDER_IMAGE:-golang:1.22-alpine}
        MGP_NODE_BUILDER_IMAGE: ${MGP_NODE_BUILDER_IMAGE:-node:20-alpine}
        MGP_ALL_IN_ONE_RUNTIME_IMAGE: ${MGP_ALL_IN_ONE_RUNTIME_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MGP_POSTGRES_DB:-mvp_push_gateway_dev}
      POSTGRES_USER: ${MGP_POSTGRES_USER:-mvp_push_gateway}
      POSTGRES_PASSWORD: ${MGP_POSTGRES_PASSWORD:-change-me-dev-password}
      MGP_API_PREFIX: ${MGP_API_PREFIX:-/api/v1}
    ports:
      - "${MGP_ALL_IN_ONE_HTTP_PORT:-18080}:80"
    volumes:
      - ${MGP_ALL_IN_ONE_DATA_DIR:-./deploy/data/all-in-one/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "/app/mgp-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  postgres:
    image: ${MGP_POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MGP_POSTGRES_DB:-mvp_push_gateway_dev}
      POSTGRES_USER: ${MGP_POSTGRES_USER:-mvp_push_gateway}
      POSTGRES_PASSWORD: ${MGP_POSTGRES_PASSWORD:-change-me-dev-password}
      MGP_TEST_POSTGRES_DB: ${MGP_TEST_POSTGRES_DB:-mvp_push_gateway_test}
    ports:
      - "${MGP_POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${MGP_POSTGRES_DATA_DIR:-./deploy/data/postgres}:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  migrate:
    <<: *backend-image
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./deploy/env/backend.env
    environment:
      MGP_POSTGRES_DSN: postgres://${MGP_POSTGRES_USER:-mvp_push_gateway}:${MGP_POSTGRES_PASSWORD:-change-me-dev-password}@postgres:5432/${MGP_POSTGRES_DB:-mvp_push_gateway_dev}?sslmode=disable
    command: ["/app/mgp-migrate"]
    read_only: true
    tmpfs:
      - /tmp

  backend:
    <<: *backend-image
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - ./deploy/env/backend.env
    environment:
      MGP_POSTGRES_DSN: postgres://${MGP_POSTGRES_USER:-mvp_push_gateway}:${MGP_POSTGRES_PASSWORD:-change-me-dev-password}@postgres:5432/${MGP_POSTGRES_DB:-mvp_push_gateway_dev}?sslmode=disable
    command: ["/app/mgp-server"]
    ports:
      - "${MGP_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "/app/mgp-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp

  frontend:
    image: ${MGP_FRONTEND_IMAGE:-mvp-push-gateway-frontend:local}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        MGP_NODE_BUILDER_IMAGE: ${MGP_NODE_BUILDER_IMAGE:-node:20-alpine}
        MGP_FRONTEND_RUNTIME_IMAGE: ${MGP_FRONTEND_RUNTIME_IMAGE:-nginx:1.27-alpine}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${MGP_FRONTEND_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s
