<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="200" viewBox="0 0 1220 200" fill="none" style="font-family:Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif;">

<defs>
  <linearGradient id="blueMain" x1="0" y1="0" x2="1" y2="1">
