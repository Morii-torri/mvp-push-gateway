      <path d="M 345.0 467.5 C 345.0 437.5 370.0 413.75 402.5 418.75 C 415.0 377.5 467.5 360.0 502.5 388.75 C 515.0 382.5 532.5 387.5 545.0 400.0" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="6.25" stroke-linecap="round"/>
