  </linearGradient>
  <linearGradient id="cubeTop" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#56E0FF"/>
    <stop offset="1" stop-color="#1979FF"/>
  </linearGradient>
  <linearGradient id="cubeFront" x1="0" y1="0" x2="1" y2="1">
