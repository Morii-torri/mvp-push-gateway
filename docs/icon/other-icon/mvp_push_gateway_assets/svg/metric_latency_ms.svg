    <stop offset="1" stop-color="#1B7CFF" stop-opacity="0"/>
  </radialGradient>
  <filter id="softShadow" x="-35%" y="-35%" width="170%" height="170%">
    <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#286FC8" flood-opacity="0.22"/>
  </filter>
  <filter id="smallShadow" x="-35%" y="-35%" width="170%" height="170%">
