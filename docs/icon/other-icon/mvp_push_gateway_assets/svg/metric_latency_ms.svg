<svg xmlns="http://www.w3.org/2000/svg" width="480" height="220" viewBox="0 0 480 220" fill="none" style="font-family:Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif;">

<defs>
  <linearGradient id="blueMain" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#1A67FF"/>
    <stop offset="0.52" stop-color="#208BFF"/>
    <stop offset="1" stop-color="#31D4FF"/>
  </linearGradient>
  <linearGradient id="blueDeep" x1="0" y1="0" x2="1" y2="1">
