<svg xmlns="http://www.w3.org/2000/svg" width="780" height="360" viewBox="0 0 780 360" fill="none" style="font-family:Noto Sans CJK SC, PingFang SC, Microsoft YaHei, Arial, sans-serif;">

<defs>
  <linearGradient id="blueMain" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#1A67FF"/>
